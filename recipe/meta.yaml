{% set name = "azure-mgmt-appcontainers" %}
{% set version = "2.0.0" %}

package:
  name: {{ name }}
  version: {{ version }}

source:
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.zip
  sha256: 71c74876f7604d83d6119096aa42dcf2512e32e004111be5e41d61b89c8192f5

build:
  number: 0
  script: {{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation
  skip: true  # [py<37]

requirements:
  host:
    - pip
    - python
    - setuptools
    - wheel
  run:
    - python
    - msrest >=0.7.1
    - azure-common >=1.1,<2
    - azure-mgmt-core >=1.3.2,<2.0.0
    - typing-extensions >=4.3.0  # [py<38]

test:
  imports:
    - azure.mgmt.appcontainers
    - azure.mgmt.appcontainers.aio
  commands:
    - pip check
  requires:
    - pip

about:
  home: https://github.com/Azure/azure-sdk-for-python
  summary: Microsoft Azure Appcontainers Management Client Library for Python
  license: MIT
  license_file: LICENSE
  license_family: MIT
  description: Microsoft Azure Appcontainers Management Client Library for Python
  dev_url: https://github.com/Azure/azure-sdk-for-python
  doc_url: https://github.com/Azure/azure-sdk-for-python

extra:
  recipe-maintainers:
    - janjagusch
